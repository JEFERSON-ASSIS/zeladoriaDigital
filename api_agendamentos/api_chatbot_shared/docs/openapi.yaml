openapi: 3.0.3
info:
  title: API Chatbot — Agendamentos PSF
  description: |
    APIs HTTP para integração com **n8n**, chatbot WhatsApp e outros clientes JSON.

    Cada unidade (PSF1, PSF2, PSF3) possui a **mesma estrutura de endpoints** em pastas separadas.
    Selecione o servidor correspondente à unidade no topo do Swagger.

    **Importante:** `api_chatbot_shared` **não** é URL de API (só código PHP compartilhado).
    Use `api_chatbot_psf1`, `api_chatbot_psf2` ou `api_chatbot_psf3` + `/endpoints/...`

    Exemplo produção PSF1:
    `https://saude.agendaclique.com.br/api_chatbot_psf1/endpoints/disponibilidade/dias.php?servico=18`

    | Unidade | Pasta | empresa_id | Médico | Enfermeiro | Dentista |
    |---------|-------|------------|--------|------------|----------|
    | PSF1 | api_chatbot_psf1 | 1 | 18 | 20 | 22 |
    | PSF2 | api_chatbot_psf2 | 2 | 21 | 23 | 19 |
    | PSF3 | api_chatbot_psf3 | 3 | 24 | 25 | 0* |

    \* PSF3: dentista desativado até configurar em `config/config.php`.

    **Fluxo médico (turno):** listar → dias → **turnos** → criar (com `turno`).

    **Fluxo médico (hora — PSF1):** listar → **dias_medico** → **horarios_medico** → **criar_medico_hora** (com `hora`).

    **Fluxo dentista:** listar → dias → horarios → criar (com `hora`).

    **Fluxo enfermeiro:** listar → dias → criar (sem `hora`).

    **Fluxo programas (cancelamento):** listar_programas → cancelar_programa.

    ### Rotas por unidade

    | Rota | PSF1 | PSF2 | PSF3 |
    |------|:----:|:----:|:----:|
    | index.php | ✓ | ✓ | ✓ |
    | health.php | ✓ | ✓ | ✓ |
    | disponibilidade/dias.php | ✓ | ✓ | ✓ |
    | disponibilidade/dias_medico.php | ✓ | ✓ | ✓ |
    | disponibilidade/turnos.php | ✓ | ✓ | ✓ |
    | disponibilidade/horarios_medico.php | ✓ | ✓ | ✓ |
    | disponibilidade/horarios.php | ✓ | ✓ | ✓* |
    | agendamentos/listar.php | ✓ | ✓ | ✓ |
    | agendamentos/listar_programas.php | ✓ | ✓ | ✓ |
    | agendamentos/criar.php | ✓ | ✓ | ✓ |
    | agendamentos/criar_medico_hora.php | ✓ | ✓ | ✓ |
    | agendamentos/cancelar.php | ✓ | ✓ | ✓ |
    | agendamentos/cancelar_programa.php | ✓ | ✓ | ✓ |

    \* PSF3: horarios.php só se dentista > 0 no config.

    Documentação completa: `DOCUMENTACAO_API_CHATBOT.md`
  version: 1.3.0
  contact:
    name: Suporte API Agendamentos

servers:
  - url: https://saude.agendaclique.com.br/api_chatbot_psf1
    description: PSF1 — Produção (empresa 1) — use esta no n8n
  - url: https://saude.agendaclique.com.br/api_chatbot_psf2
    description: PSF2 — Produção (empresa 2)
  - url: https://saude.agendaclique.com.br/api_chatbot_psf3
    description: PSF3 — Produção (empresa 3)
  - url: https://saude.agendaclique.com.br/painel/api_chatbot_psf1
    description: PSF1 — Produção (se APIs estiverem dentro de /painel/)
  - url: https://saude.agendaclique.com.br/painel/api_chatbot_psf2
    description: PSF2 — Produção (/painel/)
  - url: https://saude.agendaclique.com.br/painel/api_chatbot_psf3
    description: PSF3 — Produção (/painel/)
  - url: http://localhost/producao/Nova%20pasta/api_chatbot_psf1
    description: PSF1 — Local XAMPP
  - url: http://localhost/producao/Nova%20pasta/api_chatbot_psf2
    description: PSF2 — Local XAMPP
  - url: http://localhost/producao/Nova%20pasta/api_chatbot_psf3
    description: PSF3 — Local XAMPP

tags:
  - name: Descoberta
    description: Metadados, health check e URLs da unidade
  - name: Disponibilidade
    description: Dias, turnos e horários livres
  - name: Agendamentos
    description: Listar, criar e cancelar consultas normais
  - name: Programas
    description: Listar e cancelar atendimentos de programas de saúde

security:
  - ApiKeyHeader: []
  - ApiKeyQuery: []

paths:
  /index.php:
    get:
      tags: [Descoberta]
      summary: Descoberta da API (JSON)
      description: Retorna unidade, IDs de serviços e URLs de exemplo dos endpoints.
      security: []
      responses:
        '200':
          description: Metadados da unidade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexResponse'

  /health.php:
    get:
      tags: [Descoberta]
      summary: Health check / diagnóstico de deploy
      description: |
        Verifica se `api_chatbot_shared`, `config.php` e conexão com banco estão OK.
        Retorna HTTP 200 se tudo certo, 503 se falhar algum check.
      security: []
      responses:
        '200':
          description: Ambiente OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Falha em shared, config ou banco
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /endpoints/agendamentos/listar.php:
    get:
      tags: [Agendamentos]
      summary: Listar agendamentos por CPF
      description: |
        Lista agendamentos com status **Ausente** e indica se cada tipo de serviço
        está bloqueado para novo agendamento (`bloquear_por_servico`).
      parameters:
        - $ref: '#/components/parameters/cpf'
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Lista ou status do paciente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
              examples:
                comAusente:
                  summary: Com agendamento ausente
                  value:
                    statusCode: 200
                    data:
                      status: success
                      documento: '12345678901'
                      empresa: 1
                      total: 1
                      bloquear_por_servico:
                        medico: true
                        dentista: false
                        enfermeiro: false
                      agendamentos:
                        - id: 100
                          nome: Maria Silva
                          servico: Consulta Médica
                          data: '20/05/2026'
                          hora: '08:30'
                          status: Ausente
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Agendamentos]
      summary: Listar agendamentos (POST)
      description: Mesmo comportamento do GET; aceita `cpf` ou `cns_cpf` no body.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cpf:
                  type: string
                  example: '12345678901'
                cns_cpf:
                  type: string
      responses:
        '200':
          description: Lista ou status do paciente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'

  /endpoints/disponibilidade/dias.php:
    get:
      tags: [Disponibilidade]
      summary: Próximos dias com vaga
      parameters:
        - $ref: '#/components/parameters/servico'
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Dias disponíveis
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiasDisponiveis'
              example:
                statusCode: 200
                data:
                  dataBase: '18/05/2026'
                  dias:
                    - '19/05/2026 segunda-feira'
                    - '20/05/2026 terça-feira'
                  vagas: [5, 4]
                meta:
                  servico: 18
                  empresa: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /endpoints/disponibilidade/dias_medico.php:
    get:
      tags: [Disponibilidade]
      summary: Dias com vaga para medico (fluxo com hora)
      x-disponivelEm: [PSF1, PSF2, PSF3]
      description: |
        Lista dias que ainda possuem **horario livre** para consulta medica,
        no mesmo espirito do fluxo do dentista.

        Use antes de `horarios_medico.php` e `criar_medico_hora.php`.
        Disponivel no PSF1, PSF2 e PSF3. Nas demais unidades, use apenas se a rota existir na pasta da unidade.
      parameters:
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Dias disponiveis para medico com escolha de hora
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DiasDisponiveis'
              example:
                statusCode: 200
                data:
                  dataBase: '18/05/2026'
                  dias:
                    - '19/05/2026 segunda-feira'
                    - '20/05/2026 terça-feira'
                  vagas: [5, 4]
                  turno_tarde: [true, false]
                  vagas_tarde: [3, 0]
                  falar: Mostre os dias disponiveis. Quando o usuario escolher um dia, consulte horarios_medico.php.
                meta:
                  servico: 18
                  empresa: 1
        '400':
          $ref: '#/components/responses/BadRequest'

  /endpoints/disponibilidade/turnos.php:
    get:
      tags: [Disponibilidade]
      summary: Turnos manhã/tarde (médico)
      description: |
        **Apenas serviço médico** da unidade. Após o usuário escolher o dia em `dias.php`,
        use este endpoint para saber se deve perguntar **1 = manhã** ou **2 = tarde**.
      parameters:
        - $ref: '#/components/parameters/servicoMedico'
        - $ref: '#/components/parameters/data'
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Disponibilidade por turno
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TurnosDia'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Sem vaga, dia bloqueado ou agenda não configurada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /endpoints/disponibilidade/horarios_medico.php:
    get:
      tags: [Disponibilidade]
      summary: Horarios livres no dia (medico com hora)
      x-disponivelEm: [PSF1, PSF2, PSF3]
      description: |
        Rota para o fluxo de medico com escolha de horario pelo usuario.
        Use depois de `dias_medico.php` e antes de `criar_medico_hora.php`.

        Disponivel no PSF1, PSF2 e PSF3. Nas demais unidades, use apenas se a rota existir na pasta da unidade.
      parameters:
        - $ref: '#/components/parameters/data'
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Horarios disponiveis para medico
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HorariosMedico'
              example:
                statusCode: 200
                data:
                  data: '20/05/2026'
                  dataISO: '2026-05-20'
                  horarios: ['07:00', '07:30', '08:00']
                  tempo_agendamento: 30
                  perguntar_hora: true
                  falar: Escolha um dos horarios disponiveis para consulta medica.
                meta:
                  servico: 18
                  empresa: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: DATA_BLOQUEADA, DIA_FECHADO, LIMITE_DIA_ATINGIDO ou SEM_HORARIOS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /endpoints/disponibilidade/horarios.php:
    get:
      tags: [Disponibilidade]
      summary: Horários livres no dia
      description: |
        Principalmente **dentista** (usuário escolhe hora). Lista slots livres
        respeitando `vagas_por_hora` por bloco horário.
      parameters:
        - $ref: '#/components/parameters/servico'
        - $ref: '#/components/parameters/data'
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Horários disponíveis
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HorariosLivres'
        '422':
          description: DATA_BLOQUEADA ou SEM_HORARIOS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /endpoints/agendamentos/criar.php:
    post:
      tags: [Agendamentos]
      summary: Criar agendamento
      description: |
        - **Médico:** informe `turno` quando `turnos.php` retornar `perguntar_turno: true`.
          Não envie `hora` — a API escolhe o primeiro slot livre do turno.
        - **Dentista:** `hora` obrigatória (HH:MM).
        - **Enfermeiro:** sem `hora` na maioria dos fluxos; pode enviar array de horas conforme regra do serviço.

        Resposta no **formato legado** (`sucesso`, `id`, …), não no envelope `statusCode/data`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriarAgendamentoRequest'
            examples:
              medicoManha:
                summary: Médico — turno manhã
                value:
                  nome: Maria Silva
                  telefone: '65999999999'
                  cpf: '12345678901'
                  servico: 18
                  empresa: 1
                  data: '20/05/2026'
                  turno: manha
                  setor: Centro
              dentista:
                summary: Dentista — hora fixa
                value:
                  nome: João Santos
                  telefone: '65988888888'
                  cpf: '98765432100'
                  servico: 22
                  empresa: 1
                  data: '21/05/2026'
                  hora: '13:30'
                  setor: Jardim
              enfermeiro:
                summary: Enfermeiro — sem hora
                value:
                  nome: Ana Costa
                  telefone: '65977777777'
                  cpf: '11122233344'
                  servico: 20
                  empresa: 1
                  data: '22/05/2026'
                  setor: Centro
      responses:
        '200':
          description: Agendamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CriarAgendamentoResponse'
        '400':
          description: Validação (CPF, campos, turno inválido)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '422':
          description: Regra de negócio (data bloqueada, sem vaga, turno obrigatório)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LegacyError'
                  - $ref: '#/components/schemas/ApiError'

  /endpoints/agendamentos/criar_medico_hora.php:
    post:
      tags: [Agendamentos]
      summary: Criar agendamento medico com hora escolhida
      x-disponivelEm: [PSF1]
      description: |
        Rota nova para medico funcionar como dentista: o usuario escolhe um horario
        retornado por `horarios_medico.php`, e a API salva exatamente esta hora no banco.

        A rota define o servico medico automaticamente pela unidade, entao nao precisa enviar `servico`.
        Disponivel no PSF1. Nas demais unidades, use apenas se a rota existir na pasta da unidade.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriarMedicoHoraRequest'
            example:
              nome: Maria Silva
              telefone: '65999999999'
              cpf: '12345678901'
              empresa: 1
              data: '20/05/2026'
              hora: '07:30'
              setor: Centro
      responses:
        '200':
          description: Agendamento medico criado com hora fixa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CriarAgendamentoResponse'
        '400':
          description: Validacao (CPF, campos, hora ausente ou invalida)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyError'
        '422':
          description: Regra de negocio (data bloqueada, limite atingido, horario indisponivel)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LegacyError'
                  - $ref: '#/components/schemas/ApiError'

  /endpoints/agendamentos/cancelar.php:
    get:
      tags: [Agendamentos]
      summary: Cancelar agendamento
      description: |
        Com `cancelamento_soft: true` (padrão), atualiza status para `Cancelado usuário`.
        Aceita GET, POST ou DELETE.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            example: 12345
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Cancelado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Agendamentos]
      summary: Cancelar agendamento (POST)
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Cancelado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
    delete:
      tags: [Agendamentos]
      summary: Cancelar agendamento (DELETE)
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Cancelado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'

  /endpoints/agendamentos/listar_programas.php:
    get:
      tags: [Programas]
      summary: Listar atendimentos de programas para cancelamento
      description: |
        Lista registros da tabela `agendamentos_programas` pelo CPF/CNS.
        Equivalente ao robô `api_listar_cancelamento_programas.php`.
        Resposta com `tipo: programas` e lista em `agendamentos`.
      parameters:
        - $ref: '#/components/parameters/cpf'
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Lista de programas encontrados
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ListarProgramasData'
              example:
                statusCode: 200
                data:
                  status: success
                  documento: '12345678901'
                  empresa: 1
                  tipo: programas
                  total: 1
                  agendamentos:
                    - id: 55
                      nome: Maria Silva
                      servico: Hipertensão - Enf. Joana
                      servico_canonico: enfermeiro
                      data: '20/05/2026'
                      hora: '-'
                      status: Agendado
                meta:
                  empresa: 1
        '404':
          description: Nenhum atendimento de programa
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ListarProgramasNotFound'
    post:
      tags: [Programas]
      summary: Listar programas (POST)
      description: Mesmo comportamento do GET; aceita `cpf` no body.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cpf:
                  type: string
                  example: '12345678901'
      parameters:
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Lista de programas encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'

  /endpoints/agendamentos/cancelar_programa.php:
    get:
      tags: [Programas]
      summary: Cancelar atendimento de programa
      description: |
        Exclui o registro em `agendamentos_programas` (DELETE físico, igual ao robô).
        Aceita GET, POST ou DELETE. Parâmetro `id` obrigatório.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            example: 99
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Cancelado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CancelarProgramaData'
              example:
                statusCode: 200
                data:
                  status: deleted
                  success: true
                  message: Cancelado com sucesso.
                  table: agendamentos_programas
                  id: 99
                  affected_rows: 1
                meta:
                  empresa: 1
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Exclusão não confirmada (NOT_UPDATED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags: [Programas]
      summary: Cancelar programa (POST)
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Cancelado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
    delete:
      tags: [Programas]
      summary: Cancelar programa (DELETE)
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/empresa'
      responses:
        '200':
          description: Cancelado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Opcional se `api_key` estiver vazio no config.php da unidade.
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api_key

  parameters:
    cpf:
      name: cpf
      in: query
      required: true
      description: CPF ou CNS (apenas dígitos ou formatado). Alias `cns_cpf`.
      schema:
        type: string
        example: '12345678901'
    servico:
      name: servico
      in: query
      required: true
      description: ID do serviço no banco (médico, enfermeiro ou dentista conforme unidade).
      schema:
        type: integer
        example: 18
    servicoMedico:
      name: servico
      in: query
      required: true
      description: ID do serviço **médico** da unidade (PSF1=18, PSF2=21, PSF3=24).
      schema:
        type: integer
        example: 18
    data:
      name: data
      in: query
      required: true
      description: Data no formato DD/MM/AAAA ou AAAA-MM-DD.
      schema:
        type: string
        example: '20/05/2026'
    empresa:
      name: empresa
      in: query
      required: false
      description: ID da empresa. Padrão conforme `empresa_id` do config da pasta.
      schema:
        type: integer
        example: 1

  schemas:
    ApiEnvelope:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        data:
          type: object
        meta:
          type: object
          additionalProperties: true

    ApiError:
      type: object
      properties:
        statusCode:
          type: integer
        data:
          type: object
          properties:
            code:
              type: string
              example: DATA_BLOQUEADA
            message:
              type: string

    IndexResponse:
      type: object
      properties:
        api:
          type: string
        unidade:
          type: string
        empresa_id:
          type: integer
        servicos:
          type: object
          properties:
            medico:
              type: integer
            enfermeiro:
              type: integer
            dentista:
              type: integer
        fluxos:
          type: object
        endpoints:
          type: object

    DiasDisponiveis:
      type: object
      properties:
        dataBase:
          type: string
          example: '18/05/2026'
        dias:
          type: array
          items:
            type: string
          example: ['19/05/2026 segunda-feira']
        vagas:
          type: array
          items:
            type: integer
          example: [5, 4]
        turno_tarde:
          type: array
          description: |
            Disponibilidade no turno da tarde para cada item de `dias`.
            Retornado no fluxo medico.
          items:
            type: boolean
          example: [true, false]
        vagas_tarde:
          type: array
          description: |
            Quantidade de vagas da tarde para cada item de `dias`.
            Retornado no fluxo medico.
          items:
            type: integer
          example: [3, 0]
        falar:
          type: string
          description: Texto sugerido para o bot (dentista)

    TurnoInfo:
      type: object
      properties:
        disponivel:
          type: boolean
        vagas:
          type: integer
        label:
          type: string

    TurnosDia:
      type: object
      properties:
        data:
          type: string
          example: '20/05/2026'
        dataISO:
          type: string
          format: date
          example: '2026-05-20'
        turnos_manha:
          type: boolean
          description: true = há vaga no turno da manhã
        turnos_tarde:
          type: boolean
          description: true = há vaga no turno da tarde
        ambos_turnos:
          type: boolean
          description: true = manhã e tarde com vaga; bot deve perguntar qual turno
        cenario_turno:
          type: string
          enum: [ambos, manha, tarde]
          description: |
            `ambos` = usuário escolhe (1 manhã / 2 tarde);
            `manha` ou `tarde` = só um turno; use `turno_sugerido` no criar.php
        turnos:
          type: object
          properties:
            manha:
              $ref: '#/components/schemas/TurnoInfo'
            tarde:
              $ref: '#/components/schemas/TurnoInfo'
        perguntar_turno:
          type: boolean
          description: Igual a `ambos_turnos` — true = perguntar 1 (manhã) ou 2 (tarde)
        turno_sugerido:
          type: string
          nullable: true
          enum: [manha, tarde, null]
        falar:
          type: string

    HorariosLivres:
      type: object
      properties:
        empresa:
          type: integer
        servico:
          type: integer
        data:
          type: string
          format: date
        horarios:
          type: array
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
          example: ['08:00', '08:30', '09:00']
        tempo_agendamento:
          type: integer
          example: 30

    HorariosMedico:
      type: object
      properties:
        data:
          type: string
          example: '20/05/2026'
        dataISO:
          type: string
          format: date
          example: '2026-05-20'
        horarios:
          type: array
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
          example: ['07:00', '07:30', '08:00']
        tempo_agendamento:
          type: integer
          nullable: true
          example: 30
        perguntar_hora:
          type: boolean
          example: true
        falar:
          type: string
          example: Escolha um dos horarios disponiveis para consulta medica.

    CriarAgendamentoRequest:
      type: object
      required: [nome, telefone, cpf, servico, empresa, data]
      properties:
        nome:
          type: string
        telefone:
          type: string
        cpf:
          type: string
          description: 11 dígitos
        servico:
          type: integer
        empresa:
          type: integer
        data:
          type: string
          description: DD/MM/AAAA ou AAAA-MM-DD
        setor:
          type: string
          description: Bairro/setor
        turno:
          type: string
          description: Médico — manha, tarde, 1 ou 2
          enum: [manha, tarde, '1', '2', cedo]
        hora:
          type: string
          description: Dentista — HH:MM
          pattern: '^\d{2}:\d{2}$'
          example: '13:30'

    CriarMedicoHoraRequest:
      type: object
      required: [nome, telefone, cpf, empresa, data, hora]
      properties:
        nome:
          type: string
        telefone:
          type: string
        cpf:
          type: string
          description: 11 digitos
        empresa:
          type: integer
        data:
          type: string
          description: DD/MM/AAAA ou AAAA-MM-DD
        hora:
          type: string
          description: Medico com hora escolhida - HH:MM retornado por horarios_medico.php
          pattern: '^\d{2}:\d{2}$'
          example: '07:30'
        setor:
          type: string
          description: Bairro/setor

    CriarAgendamentoResponse:
      type: object
      properties:
        sucesso:
          type: boolean
        mensagem:
          type: string
        id:
          type: integer
        horaAgendada:
          type: string
          example: '08:30'
        horaComparecer:
          type: string
          example: '08:00'
        turno:
          type: string
          enum: [manha, tarde]
          description: Presente em agendamento médico
        ordemDia:
          type: integer

    LegacyError:
      type: object
      properties:
        erro:
          type: string

    ListarSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        documento:
          type: string
        empresa:
          type: integer
        total:
          type: integer
        bloquear_por_servico:
          type: object
          properties:
            medico:
              type: boolean
            dentista:
              type: boolean
            enfermeiro:
              type: boolean
        agendamentos:
          type: array
          items:
            type: object
        falar:
          type: string

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        php_version:
          type: string
        document_root:
          type: string
          nullable: true
        unit_dir:
          type: string
        parent_dir:
          type: string
        checks:
          type: object
          additionalProperties: true

    AgendamentoProgramaItem:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        servico:
          type: string
        servico_canonico:
          type: string
          enum: [medico, dentista, enfermeiro, programa]
        data:
          type: string
          example: '20/05/2026'
        hora:
          type: string
          example: '-'
        status:
          type: string

    ListarProgramasData:
      type: object
      properties:
        status:
          type: string
          example: success
        documento:
          type: string
        empresa:
          type: integer
        tipo:
          type: string
          example: programas
        total:
          type: integer
        agendamentos:
          type: array
          items:
            $ref: '#/components/schemas/AgendamentoProgramaItem'

    ListarProgramasNotFound:
      type: object
      properties:
        status:
          type: string
          example: not_found
        documento:
          type: string
        empresa:
          type: integer
        tipo:
          type: string
          example: programas
        agendamentos:
          type: array
          items: {}
          example: []
        message:
          type: string
        diagnostico:
          type: object
          properties:
            documento:
              type: string
            documento_sem_zero:
              type: string
            empresa:
              type: integer
            match_documento_qualquer_empresa:
              type: integer
            match_documento_empresa:
              type: integer
            match_documento_empresa_cancelado:
              type: integer

    CancelarProgramaData:
      type: object
      properties:
        status:
          type: string
          example: deleted
        success:
          type: boolean
        message:
          type: string
        table:
          type: string
          example: agendamentos_programas
        id:
          type: integer
        affected_rows:
          type: integer

  responses:
    BadRequest:
      description: Parâmetro ausente ou inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: API key inválida ou ausente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
