<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>Sem conexão | Prefeitura na Mão</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; font-family: Arial, Helvetica, sans-serif; background: #f7faff; color: #0f172a; }
      body { display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(640px, 100%);
        background: #fff;
        border: 1px solid rgba(15, 23, 42, .08);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 18px 48px rgba(15, 23, 42, .12);
      }
      .badge { display: inline-block; border-radius: 999px; padding: 8px 12px; background: rgba(37, 99, 235, .12); color: #2563eb; font-weight: 700; margin-bottom: 16px; }
      h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3rem); }
      p { margin: 0 0 14px; line-height: 1.6; color: rgba(15, 23, 42, .8); }
      button {
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      @media (max-width: 480px) {
        .card { padding: 24px; border-radius: 22px; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Prefeitura na Mão</span>
      <h1>Você está sem conexão no momento.</h1>
      <p>Assim que a internet voltar, acesse novamente para acompanhar suas solicitações.</p>
      <p>O aplicativo continua preparado para funcionar com a interface já instalada no celular.</p>
      <button type="button" onclick="location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
